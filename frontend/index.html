<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoFactory</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #F1F5F9;
    --surface:  #FFFFFF;
    --surface2: #F8FAFC;
    --border:   #E2E8F0;
    --border2:  #CBD5E1;
    --accent:   #2563EB;
    --accent-h: #1D4ED8;
    --accent-s: #DBEAFE;
    --green:    #16A34A;
    --green-s:  #DCFCE7;
    --red:      #DC2626;
    --red-s:    #FEE2E2;
    --yellow:   #D97706;
    --yellow-s: #FEF3C7;
    --blue-s:   #EFF6FF;
    --text:     #1E293B;
    --text2:    #475569;
    --muted:    #94A3B8;
    --font:     'Inter', system-ui, -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-size: 14px;
  }

  /* ─── HEADER ─────────────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }

  .logo {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: -.3px;
  }

  .logo svg { width: 22px; height: 22px; }

  .nav-tabs {
    display: flex;
    gap: 2px;
    background: var(--bg);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .nav-tab {
    padding: 6px 16px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text2);
    transition: all .15s;
    font-family: var(--font);
  }

  .nav-tab:hover { background: var(--surface); color: var(--text); }
  .nav-tab.active { background: var(--surface); color: var(--accent); font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.08); }

  /* ─── MAIN ───────────────────────────────────────────── */
  main {
    flex: 1;
    padding: 28px 32px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  .page { display: none; }
  .page.active { display: block; }

  /* ─── BUTTONS ────────────────────────────────────────── */
  .btn {
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .15s;
    font-family: var(--font);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-h); }

  .btn-success { background: var(--green); color: #fff; }
  .btn-success:hover { background: #15803D; }

  .btn-ghost {
    background: var(--surface);
    color: var(--text2);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }

  .btn-danger {
    background: var(--surface);
    color: var(--red);
    border: 1px solid #FECACA;
  }
  .btn-danger:hover { background: var(--red-s); }

  .btn:disabled { opacity: .45; cursor: not-allowed; pointer-events: none; }

  .btn-icon {
    width: 16px; height: 16px;
    display: inline-flex; align-items: center; justify-content: center;
  }

  /* ─── TOOLBAR ────────────────────────────────────────── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .count-badge {
    margin-left: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
  }

  /* ─── TABLE ──────────────────────────────────────────── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }

  table { width: 100%; border-collapse: collapse; }

  thead { background: var(--surface2); border-bottom: 1px solid var(--border); }

  th {
    padding: 11px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
  }

  td {
    padding: 12px 16px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    color: var(--text);
  }

  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--blue-s); }

  .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }

  /* ─── FACTORY SELECT ─────────────────────────────────── */
  .factory-select {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--text);
    padding: 6px 10px;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    outline: none;
    min-width: 150px;
    transition: border-color .15s;
  }

  .factory-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-s); }
  .factory-select.firma_matriz, .factory-select.firma_sp { border-color: #93C5FD; }
  .factory-select.fluxasset_matriz, .factory-select.fluxasset_sp { border-color: #A5B4FC; }
  .factory-select.gc_matriz, .factory-select.gc_sp { border-color: #6EE7B7; }
  .factory-select.ignorar { border-color: var(--border); color: var(--muted); }

  /* ─── BADGES ─────────────────────────────────────────── */
  .badge {
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    display: inline-block;
  }

  .badge-matriz  { background: var(--blue-s);   color: var(--accent); }
  .badge-sp      { background: #EDE9FE;          color: #7C3AED; }
  .badge-normal  { background: var(--green-s);   color: var(--green); }
  .badge-descontada { background: var(--yellow-s); color: var(--yellow); }

  /* ─── CARDS ──────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }

  /* ─── STATUS PAGE ────────────────────────────────────── */
  .status-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .status-title { font-size: 15px; font-weight: 700; color: var(--text); }

  .status-pill {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .pill-aguardando  { background: var(--yellow-s);   color: var(--yellow); }
  .pill-executando  { background: var(--blue-s);     color: var(--accent); }
  .pill-concluido   { background: var(--green-s);    color: var(--green); }
  .pill-erro        { background: var(--red-s);      color: var(--red); }

  .progress-bar {
    background: var(--border);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #60A5FA);
    border-radius: 99px;
    transition: width .5s ease;
  }

  /* ─── LOG AREA ───────────────────────────────────────── */
  .log-area {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    height: 300px;
    overflow-y: auto;
    font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.7;
  }

  .log-line {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 1px 0;
    color: var(--text2);
  }

  .log-line.ok   { color: var(--green); }
  .log-line.err  { color: var(--red); }
  .log-line.warn { color: var(--yellow); }
  .log-line.info { color: var(--accent); }
  .log-line.running { color: var(--accent); font-weight: 500; }

  .log-icon {
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }

  /* Spinner for in-progress log lines */
  .log-spinner {
    width: 12px;
    height: 12px;
    border: 2px solid var(--accent-s);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Loading spinner inside buttons */
  .btn-spinner {
    display: inline-block;
    width: 13px;
    height: 13px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }

  /* ─── CONFIRM BOX ────────────────────────────────────── */
  .confirm-box {
    background: linear-gradient(135deg, #F0FDF4, #EFF6FF);
    border: 1px solid #86EFAC;
    border-radius: 12px;
    padding: 28px;
    text-align: center;
    margin-top: 20px;
  }

  .confirm-box h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
  .confirm-box p  { color: var(--text2); font-size: 13px; margin-bottom: 20px; }

  /* ─── CONFIG ─────────────────────────────────────────── */
  .config-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .config-card { padding: 22px; }

  .config-card h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
  }

  .config-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .config-dot.ok { background: var(--green); }

  .field { margin-bottom: 12px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--muted);
    margin-bottom: 5px;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    padding: 9px 12px;
    font-family: var(--font);
    font-size: 13px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-s);
  }

  /* ─── EMPTY STATE ────────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
  }

  .empty-state .icon {
    font-size: 44px;
    margin-bottom: 14px;
    display: block;
  }

  .empty-state h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text2);
  }

  .empty-state p { font-size: 13px; }

  /* ─── KPI GRID ───────────────────────────────────────── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }

  .kpi-icon { font-size: 20px; margin-bottom: 8px; display: block; }
  .kpi-val  { font-size: 22px; font-weight: 700; font-family: 'SF Mono', monospace; line-height: 1.2; }
  .kpi-lbl  { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin-top: 4px; }

  /* ─── SECTION HEADER ─────────────────────────────────── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--muted);
  }

  /* ─── VALOR / CNPJ helpers ───────────────────────────── */
  .valor { font-family: 'SF Mono', monospace; color: var(--green); font-weight: 600; }
  .cnpj  { font-family: 'SF Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 1px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
    </svg>
    AutoFactory
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('faturas')">Faturas</button>
    <button class="nav-tab" onclick="showPage('status')">Operações</button>
    <button class="nav-tab" onclick="showPage('relatorios')">Relatórios</button>
    <button class="nav-tab" onclick="showPage('config')">Configurações</button>
  </div>
</header>

<main>

  <!-- ── FATURAS ──────────────────────────────────────── -->
  <div class="page active" id="page-faturas">
    <div class="toolbar">
      <button class="btn btn-primary" id="btn-carregar" onclick="carregarFaturas()">
        <svg class="btn-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        Carregar do GW
      </button>
      <button class="btn btn-success" id="btn-executar" onclick="executarAutomacao()" disabled>
        <svg class="btn-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/></svg>
        Executar Selecionadas
      </button>
      <button class="btn btn-ghost" onclick="selecionarTodas()">Selecionar Todas</button>
      <button class="btn btn-danger" id="btn-excluir" onclick="excluirSelecionadas()" disabled>
        <svg class="btn-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        Excluir
      </button>
      <div class="count-badge" id="count-badge">0 faturas</div>
    </div>
    <div id="faturas-container">
      <div class="empty-state">
        <span class="icon">📄</span>
        <h3>Nenhuma fatura carregada</h3>
        <p>Clique em "Carregar do GW" para buscar as faturas de hoje</p>
      </div>
    </div>
  </div>

  <!-- ── STATUS ───────────────────────────────────────── -->
  <div class="page" id="page-status">
    <div id="status-container">
      <div class="empty-state">
        <span class="icon">🔄</span>
        <h3>Nenhuma operação em andamento</h3>
        <p>Execute uma automação na aba Faturas</p>
      </div>
    </div>
  </div>

  <!-- ── RELATÓRIOS ────────────────────────────────────── -->
  <div class="page" id="page-relatorios">
    <div id="relatorios-container">
      <div class="empty-state"><span class="icon">📊</span><h3>Carregando...</h3></div>
    </div>
  </div>

  <!-- ── CONFIG ───────────────────────────────────────── -->
  <div class="page" id="page-config">
    <div class="config-grid" id="config-grid"></div>
  </div>

</main>

<script>
const API = "/api";
let faturas = [];
let operacaoAtual = null;
let poolingInterval = null;
let operacaoStartTime = null;   // Marcado no clique em "Carregar do GW"

// ── NAV ──────────────────────────────────────────────────
function showPage(name, fromHash) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const tabs = {faturas:0, status:1, relatorios:2, config:3};
  if (tabs[name] !== undefined)
    document.querySelectorAll('.nav-tab')[tabs[name]].classList.add('active');
  if (name === 'config')    carregarConfig();
  if (name === 'relatorios') carregarRelatorios();
  location.hash = name;
}

// ── FATURAS ──────────────────────────────────────────────
async function carregarFaturas() {
  operacaoStartTime = Date.now();   // Inicia temporizador da operação completa
  const btn = document.getElementById('btn-carregar');
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner"></span> Baixando...';

  try {
    const resp = await fetch(`${API}/faturas`);
    if (!resp.ok) throw new Error((await resp.json()).detail || 'Erro no servidor');
    const data = await resp.json();
    faturas = data.faturas || [];
    renderFaturas();
    document.getElementById('btn-executar').disabled = faturas.length === 0;
  } catch(e) {
    alert('Erro ao carregar faturas:\n' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg class="btn-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg> Carregar do GW';
  }
}

function renderFaturas() {
  const container = document.getElementById('faturas-container');
  const badge     = document.getElementById('count-badge');

  if (!faturas.length) {
    container.innerHTML = '<div class="empty-state"><span class="icon">📭</span><h3>Sem faturas para hoje</h3><p>Nenhuma fatura encontrada com emissão hoje</p></div>';
    badge.textContent = '0 faturas';
    return;
  }

  badge.textContent = `${faturas.length} fatura(s)`;

  const rows = faturas.map((f, i) => {
    const filialBadge = f.filial?.includes('SP')
      ? `<span class="badge badge-sp">Filial SP</span>`
      : `<span class="badge badge-matriz">Matriz</span>`;

    const sitBadge = f.situacao === 'Normal'
      ? `<span class="badge badge-normal">Normal</span>`
      : `<span class="badge badge-descontada">Descontada</span>`;

    const sugestao = f.factory_sugerida || 'ignorar';
    const isSP = f.filial?.includes('SP');

    const opcoesMatriz = `
      <option value="firma_matriz"     ${sugestao==='firma_matriz'    ?'selected':''}>Firma Matriz</option>
      <option value="fluxasset_matriz" ${sugestao==='fluxasset_matriz'?'selected':''}>FluxAsset Matriz</option>
      <option value="gc_matriz"        ${sugestao==='gc_matriz'       ?'selected':''}>GC Matriz</option>
      <option value="ignorar">— Ignorar</option>`;
    const opcoesSP = `
      <option value="firma_sp"         ${sugestao==='firma_sp'    ?'selected':''}>Firma SP</option>
      <option value="fluxasset_sp"     ${sugestao==='fluxasset_sp'?'selected':''}>FluxAsset SP</option>
      <option value="gc_sp"            ${sugestao==='gc_sp'       ?'selected':''}>GC SP</option>
      <option value="ignorar">— Ignorar</option>`;

    return `<tr>
      <td style="width:36px;padding-left:18px">
        <input type="checkbox" id="chk-${i}" checked onchange="atualizarContador()"
          style="width:15px;height:15px;cursor:pointer;accent-color:var(--accent)">
      </td>
      <td class="mono" style="color:var(--text2)">${f.numero}</td>
      <td>
        <div style="font-weight:600">${f.cliente_nome}</div>
        <div class="cnpj">${f.cliente_cnpj}</div>
      </td>
      <td>${filialBadge}</td>
      <td class="mono" style="color:var(--text2)">${f.vencimento}</td>
      <td class="valor">R$ ${Number(f.valor).toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
      <td>${sitBadge}</td>
      <td>
        <select class="factory-select ${sugestao}" id="factory-${i}" onchange="updateSelectStyle(this)">
          ${isSP ? opcoesSP : opcoesMatriz}
        </select>
      </td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:36px"></th>
            <th>Nº Fatura</th>
            <th>Cliente</th>
            <th>Filial</th>
            <th>Vencimento</th>
            <th>Valor</th>
            <th>Situação</th>
            <th>Factory</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  atualizarContador();
}

function updateSelectStyle(sel) {
  sel.className = 'factory-select ' + sel.value;

function selecionarTodas() {
  document.querySelectorAll('[id^="chk-"]').forEach(c => c.checked = true);
  atualizarContador();
}

function atualizarContador() {
  const selecionadas = document.querySelectorAll('[id^="chk-"]:checked').length;
  document.getElementById('count-badge').textContent =
    `${faturas.length} fatura(s) — ${selecionadas} selecionada(s)`;
  const btnExcluir = document.getElementById('btn-excluir');
  if (btnExcluir) btnExcluir.disabled = selecionadas === 0;
}

function excluirSelecionadas() {
  const indices = [];
  faturas.forEach((_, i) => { if (document.getElementById(`chk-${i}`)?.checked) indices.push(i); });
  if (!indices.length) return;
  if (!confirm(`Remover ${indices.length} fatura(s) da lista local?`)) return;
  faturas = faturas.filter((_, i) => !indices.includes(i));
  renderFaturas();
  document.getElementById('btn-executar').disabled = faturas.length === 0;
}

async function executarAutomacao() {
  const selecionadas = [];
  faturas.forEach((f, i) => {
    const chk     = document.getElementById(`chk-${i}`);
    const factory = document.getElementById(`factory-${i}`);
    if (chk?.checked) selecionadas.push({ numero: f.numero, factory: factory?.value || 'ignorar' });
  });

  if (!selecionadas.filter(f => f.factory !== 'ignorar').length) {
    alert('Nenhuma fatura selecionada para envio!');
    return;
  }

  const resp = await fetch(`${API}/executar`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ faturas: selecionadas }),
  });

  const data = await resp.json();
  operacaoAtual = data.operacao_id;
  document.querySelectorAll('.nav-tab')[1].click();
  iniciarPolling();
}

function iniciarPolling() {
  if (poolingInterval) clearInterval(poolingInterval);
  poolingInterval = setInterval(atualizarStatus, 1500);
}

async function atualizarStatus() {
  if (!operacaoAtual) return;
  const resp = await fetch(`${API}/status/${operacaoAtual}`);
  const s = await resp.json();
  renderStatus(s);
  if (['concluido', 'erro'].includes(s.status)) clearInterval(poolingInterval);
  // Mantém polling durante salvamento de documentos
  if (s.status === 'salvando_documentos' && !poolingInterval) {
    poolingInterval = setInterval(pollStatus, 1500);
  }
}

</svg>`;

const ICON_WARN = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none">
  <path d="M7 1L13 12H1L7 1Z" fill="#FEF3C7" stroke="#D97706" stroke-width="1" stroke-linejoin="round"/>

const ICON_DOT = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none">
  <circle cx="7" cy="7" r="2.5" fill="#CBD5E1"/>
</svg>`;

const SPINNER_HTML = `<span class="log-spinner"></span>`;

// Strip known emoji prefixes from log line text
function stripEmoji(txt) {
  return txt
    .replace(/^[\u{1F300}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{FE00}-\u{FE0F}✅❌⚠️🔐📂📝🏢🏙️💼🏦📅📋📁📥▶️⏳🎉🔄⚡💰🎯⏱]+\s*/u, '')
    .trimStart();
}

function renderLogLines(logs, isRunning) {
  return logs.map((l, idx) => {
    const isLast = idx === logs.length - 1;
    let icon, cls, text;

    if (l.startsWith('✅')) {
      icon = ICON_OK;   cls = 'ok';   text = l.replace('✅', '').trim();
    } else if (l.startsWith('❌')) {
      icon = ICON_ERR;  cls = 'err';  text = l.replace('❌', '').trim();
    } else if (l.startsWith('⚠️')) {
      icon = ICON_WARN; cls = 'warn'; text = l.replace('⚠️', '').trim();
    } else if (isLast && isRunning) {
      icon = SPINNER_HTML; cls = 'running'; text = stripEmoji(l);
    } else if (l.startsWith('  ')) {
      // Indented sub-lines
      icon = ICON_DOT; cls = ''; text = l.trimStart();
    } else {
      icon = ICON_INFO; cls = 'info'; text = stripEmoji(l) || l;
    }

    return `<div class="log-line ${cls}"><span class="log-icon">${icon}</span><span>${text}</span></div>`;
  }).join('');
}

function _formatarTempo(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}h ${m}min ${sec}s`;
  if (m > 0) return `${m}min ${sec}s`;
  return `${sec}s`;
}

function _renderResumoDocumentos(rd, opId) {
  if (!rd || !Object.keys(rd).length) return '';

  const linhas = Object.entries(rd).map(([sistema, info]) => {
    const nome = info.nome || sistema;

    // Boleto
    const b = info.boleto;
    let boletoCell = '—';
    if (b) {
      if (b.ok) {
        boletoCell = `<span style="color:var(--green)">✅ ${b.qtd} fatura(s)</span>`;
      } else {
        boletoCell = `<span style="color:var(--red)">❌ ${b.motivo || 'falhou'}</span>`;
      }
    }

    // CTes
    const ctes = info.ctes || [];
    const ctesOk  = ctes.filter(c => c.ok).reduce((s, c) => s + (c.qtd || 0), 0);
    const ctesFail = ctes.filter(c => !c.ok).length;
    let ctesCell = '—';
    if (ctes.length > 0) {
      if (ctesOk > 0 && ctesFail === 0) {
        ctesCell = `<span style="color:var(--green)">✅ ${ctesOk} CTe(s)</span>`;
      } else if (ctesOk > 0) {
        ctesCell = `<span style="color:var(--green)">✅ ${ctesOk}</span> <span style="color:var(--red);font-size:11px">(${ctesFail} erro${ctesFail>1?'s':''})</span>`;
      } else {
        ctesCell = `<span style="color:var(--red)">❌ nenhum baixado</span>`;
      }
    }

    // ZIP
    const z = info.zip;
    let zipCell = '—';
    if (z) {
      zipCell = z.ok
        ? `<span style="color:var(--green)">✅ ${z.qtd} CTe(s)</span>`
        : `<span style="color:var(--red)">❌</span>`;
    }

    return `<tr style="border-top:1px solid var(--border)">
      <td style="padding:9px 16px;text-align:left;font-size:13px;color:var(--text)">${nome}</td>
      <td style="padding:9px 16px;text-align:center;font-size:13px">${boletoCell}</td>
      <td style="padding:9px 16px;text-align:center;font-size:13px">${ctesCell}</td>
      <td style="padding:9px 16px;text-align:center;font-size:13px">${zipCell}</td>
    </tr>`;
  }).join('');

  const btnDownload = opId
    ? `<div style="margin-top:12px;text-align:center">
        <a href="${API}/download/${opId}" download class="btn btn-primary" style="display:inline-flex">
          📥 Baixar todos os documentos (.zip)
        </a>
       </div>`
    : '';

  return `
    <div style="overflow:hidden;border:1px solid var(--border);border-radius:10px;margin:16px 0 0">
      <div style="padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);text-align:left">
        <span style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px">📥 Documentos gerados</span>
      </div>
      <table style="width:100%;border-collapse:collapse;background:var(--surface)">
        <thead>
          <tr style="background:var(--surface2);border-bottom:1px solid var(--border)">
            <th style="padding:9px 16px;text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600">Factory</th>
            <th style="padding:9px 16px;text-align:center;font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600">Boleto PDF</th>
            <th style="padding:9px 16px;text-align:center;font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600">CTes PDF</th>
            <th style="padding:9px 16px;text-align:center;font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600">ZIP</th>
          </tr>
        </thead>
        <tbody>${linhas}</tbody>
      </table>
      ${btnDownload}
    </div>`;
}

      : `${op.concluidas}`;
    return `<tr>
      <td style="padding:9px 14px;font-family:monospace;font-size:12px;color:var(--text2)">${op.op_id}</td>
      <td style="padding:9px 14px;font-size:12px;color:var(--text2)">${_fmtDt(op.data)}</td>
      <td style="padding:9px 14px;text-align:center">${fatStr}</td>
      <td style="padding:9px 14px;text-align:right;font-family:monospace;color:var(--green)">${_fmtVal(op.valor_total)}</td>
      <td style="padding:9px 14px;text-align:center;font-family:monospace;color:var(--text2)">${_fmtDur(op.duracao_seg)}</td>
      <td style="padding:9px 14px;text-align:center">
        ${ok
          ? `<span style="background:var(--green-s);color:var(--green);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600">Concluído</span>`
          : `<span style="background:var(--red-s);color:var(--red);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600">Erro</span>`}
      </td>
    </tr>`;
  }).join('');

  const thStyle = 'padding:9px 14px;text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:600;border-bottom:1px solid var(--border)';

  container.innerHTML = `
    <div class="kpi-grid">
      ${kpis.map(([lbl,val,icon,cor]) => `
        <div class="kpi-card">
          <span class="kpi-icon">${icon}</span>
          <div class="kpi-val" style="color:${cor}">${val}</div>
          <div class="kpi-lbl">${lbl}</div>
        </div>`).join('')}
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="section-header"><span class="section-title">Uso por Factory</span></div>
      <div style="overflow:hidden;border:1px solid var(--border);border-radius:8px">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--surface2)">
          <th style="${thStyle};text-align:left">Factory</th>
          <th style="${thStyle};text-align:center">Operações</th>
          <th style="${thStyle};text-align:center">Títulos</th>
          <th style="${thStyle};text-align:right">Valor Total</th>
        </tr></thead>
        <tbody>${linhasFactory || '<tr><td colspan="4" style="padding:16px;text-align:center;color:var(--muted)">Nenhum dado</td></tr>'}</tbody>
      </table>
      </div>
    </div>

    <div class="card">
      <div class="section-header">
        <span class="section-title">Histórico de Operações</span>
        <button class="btn btn-ghost" style="font-size:12px;padding:6px 12px" onclick="carregarRelatorios()">↺ Atualizar</button>
      </div>
      <div style="overflow:auto;border:1px solid var(--border);border-radius:8px">
      <table style="width:100%;border-collapse:collapse;min-width:600px">
        <thead><tr style="background:var(--surface2)">
          <th style="${thStyle}">ID</th>
          <th style="${thStyle}">Data/Hora</th>
          <th style="${thStyle};text-align:center">Faturas</th>
          <th style="${thStyle};text-align:right">Valor</th>
          <th style="${thStyle};text-align:center">Duração</th>
          <th style="${thStyle};text-align:center">Status</th>
        </tr></thead>
        <tbody>${linhasHist}</tbody>
      </table>
      </div>
    </div>`;
}

// ── HASH ROUTING ─────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const hash = location.hash.replace('#', '');
  if (['faturas','status','config','relatorios'].includes(hash)) showPage(hash, true);
});
</script>
</body>
</html>
